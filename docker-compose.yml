services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_mock_interview}
      POSTGRES_USER: ${POSTGRES_USER:-ai_mock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_mock}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_mock} -d ${POSTGRES_DB:-ai_mock_interview}"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8000
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      CHECKPOINTER_BACKEND: postgres
      POSTGRES_URL: postgresql://ai_mock:ai_mock@postgres:5432/ai_mock_interview
      SESSION_STORE_BACKEND: postgres
      MEMORY_STORE_BACKEND: postgres
      MEMORY_VECTOR_BACKEND: pgvector
    volumes:
      - ./data:/app/data
      - ./chroma_data:/app/chroma_data
      - ./memory_data:/app/memory_data
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/health' % os.getenv('PORT', '8000')).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_ACCESS_CODE: ${VITE_ACCESS_CODE:-}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
